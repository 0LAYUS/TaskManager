<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskManager - Gestión de Tareas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>📋 TaskManager</h1>
    <p>Gestión simple de tareas personales</p>
  </header>

  <main>
    <section id="form-section">
      <h2>Nueva Tarea</h2>
      <form id="task-form">
        <input type="text" id="task-title" placeholder="Título de la tarea" required />
        <textarea id="task-desc" placeholder="Descripción (opcional)"></textarea>
        <select id="task-priority">
          <option value="alta">Alta prioridad</option>
          <option value="media" selected>Media prioridad</option>
          <option value="baja">Baja prioridad</option>
        </select>
        <button type="submit">Agregar Tarea</button>
      </form>
    </section>

    <section id="tasks-section">
      <h2>Mis Tareas <span id="task-count">(0)</span></h2>
      <div id="filter-bar">
        <button class="filter-btn active" data-filter="todas">Todas</button>
        <button class="filter-btn" data-filter="pendiente">Pendientes</button>
        <button class="filter-btn" data-filter="completada">Completadas</button>
      </div>
      <ul id="task-list"></ul>
      <p id="empty-msg">No hay tareas aún. ¡Agrega una!</p>
    </section>
  </main>

  <footer>
    <p>TaskManager v1.0 &mdash; Proyecto colaborativo Mantenimiento de Software 2026</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
